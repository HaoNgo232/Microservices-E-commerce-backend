version: '3.8'

services:
  gateway:
    image: ${DOCKER_USERNAME}/lv-gateway:${VERSION:-latest}
    container_name: gateway
    
    # Expose HTTP port
    ports:
      - "3000:3000"
    
    # Environment variables
    environment:
      - PORT=3000
      - NODE_ENV=production
      - NATS_URL=${NATS_URL:-nats://localhost:4222}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - LOG_LEVEL=debug
    
    # Restart policy
    restart: unless-stopped
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Resource limits (optional)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1'
    #       memory: 512M
    #     reservations:
    #       cpus: '0.5'
    #       memory: 256M

